<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>卡牌消除</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        html, body { 
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        canvas { 
            -webkit-user-select: none; 
            user-select: none; 
            -webkit-touch-callout: none; 
            -webkit-touch-callout: none;
            touch-action: none;
        }
        #game-container { 
            width: 100%;
            height: 100%;
            max-width: 375px;
            max-height: 667px;
            margin: 0 auto;
            background: #2a2a4e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        #battle-area {
            height: 50%;
            background: #1a1a2e;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #666;
            font-size: 14px;
        }
        .enemy-hp-container {
            width: 80%;
            max-width: 300px;
            text-align: center;
            position: relative;
        }
        .enemy-hp-label {
            color: #f66;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .enemy-hp-bar-bg {
            width: 100%;
            height: 20px;
            background: #333;
            border-radius: 10px;
            overflow: hidden;
        }
        .enemy-hp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #f44, #f66);
            transition: width 0.3s;
        }
        .enemy-hp-text {
            color: #fff;
            font-size: 12px;
            margin-top: 5px;
        }
        .enemy-stats {
            font-size: 11px;
            color: #aaa;
            margin-top: 2px;
        }
        #board-area {
            height: 50%;
            display: flex;
        }
        #board-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #char-section {
            width: 70px;
            background: #252545;
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            padding: 5px 0;
        }
        .char-box {
            width: 58px;
            height: 58px;
            background: #3a3a5e;
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 10px;
        }
        .char-name {
            font-size: 11px;
            font-weight: bold;
            margin-bottom: 2px;
        }
        .char-hp-bar {
            width: 40px;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 2px;
            overflow: hidden;
        }
        .char-hp-fill {
            height: 100%;
            background: #4f4;
            transition: width 0.3s;
        }
        #game-container {
            position: relative;
        }
        .top-bar {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 10px;
            z-index: 10;
        }
        .top-bar button {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            cursor: pointer;
        }
        .config-btn { background: rgba(68,170,68,0.85); }
        .config-btn:hover { background: #44aa44; }
        .top-bar-right { display: flex; gap: 6px; }
        .back-btn { background: rgba(68,136,255,0.85); }
        .back-btn:hover { background: #4488ff; }
        .logout-btn { background: rgba(255,68,68,0.85); }
        .logout-btn:hover { background: #ff4444; }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #2a2a4e;
            border: 2px solid #5a5a8e;
            border-radius: 12px;
            padding: 20px;
            max-width: 320px;
            width: 90%;
            color: #fff;
        }
        .modal-title {
            font-size: 18px;
            font-weight: bold;
            text-align: center;
            margin-bottom: 15px;
        }
        .modal-close {
            background: #666;
            border: none;
            color: #fff;
            padding: 8px 20px;
            border-radius: 5px;
            cursor: pointer;
            display: block;
            margin: 15px auto 0;
        }
        .config-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #3a3a5e;
        }
        .config-item:last-child {
            border-bottom: none;
        }
        .config-label {
            color: #aaa;
        }
        .config-value {
            font-weight: bold;
        }
        .config-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 2px solid #5a5a8e;
        }
        .config-section-title {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 8px;
        }
        .char-box {
            width: 58px;
            height: 58px;
            background: #3a3a5e;
            border: 2px solid #555;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #aaa;
            font-size: 10px;
            position: relative;
            cursor: pointer;
        }
        .char-box.has-skill {
            animation: skillGlow 2s ease-in-out infinite;
        }
        .char-box.skill-used {
            opacity: 0.5;
            animation: none;
        }
        @keyframes skillGlow {
            0%, 100% { box-shadow: 0 0 5px rgba(255,255,0,0.3); }
            50% { box-shadow: 0 0 15px rgba(255,255,0,0.8); }
        }
        .skill-indicator {
            position: absolute;
            top: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            background: #ffff44;
            border-radius: 50%;
            animation: pulse 1s ease-in-out infinite;
        }
        .skill-used .skill-indicator {
            background: #666;
            animation: none;
        }
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.7; }
        }
        .skill-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .skill-modal.show {
            display: flex;
        }
        .skill-modal-content {
            background: #2a2a4e;
            border: 2px solid #ffff44;
            border-radius: 12px;
            padding: 20px;
            max-width: 300px;
            width: 90%;
            color: #fff;
            text-align: center;
        }
        .skill-modal-title {
            font-size: 16px;
            font-weight: bold;
            color: #ffff44;
            margin-bottom: 10px;
        }
        .skill-modal-desc {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 15px;
            line-height: 1.4;
        }
        .skill-modal-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .skill-modal-btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .skill-modal-btn.confirm {
            background: #44aa44;
            color: #fff;
        }
        .skill-modal-btn.cancel {
            background: #666;
            color: #fff;
        }
        @keyframes enemyShake {
            0%, 100% { transform: translateX(0); }
            15% { transform: translateX(-6px); }
            30% { transform: translateX(6px); }
            45% { transform: translateX(-4px); }
            60% { transform: translateX(4px); }
            75% { transform: translateX(-2px); }
            90% { transform: translateX(2px); }
        }
        .shake {
            animation: enemyShake 0.4s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div class="top-bar">
            <button class="config-btn" onclick="showConfig()">配置</button>
            <div class="top-bar-right">
                <button class="back-btn" onclick="goToMain()">返回</button>
            </div>
        </div>
        <div id="loading-overlay" style="position:absolute;top:0;left:0;width:100%;height:100%;background:#2a2a4e;display:flex;justify-content:center;align-items:center;z-index:100;">
            <span style="color:#fff;font-size:18px;">加载中...</span>
        </div>
        <div id="battle-area" style="visibility:hidden;">
            <div class="enemy-hp-container">
                <div class="enemy-hp-label">敌人</div>
                <div class="enemy-hp-bar-bg">
                    <div class="enemy-hp-bar-fill" id="enemy-hp-fill"></div>
                </div>
                <div class="enemy-hp-text" id="enemy-hp-text">-- / --</div>
                <div class="enemy-stats" id="enemy-stats">ATK: -- | DEF: --</div>
                <div id="damage-text" style="position: absolute; top: -30px; left: 50%; transform: translateX(-50%); font-size: 32px; font-weight: bold; color: #f44; pointer-events: none;"></div>
                <div id="heal-text" style="position: absolute; top: 10px; left: 50%; transform: translateX(-50%); font-size: 24px; font-weight: bold; color: #4f4; pointer-events: none;"></div>
            </div>
        </div>
        <div id="board-area">
            <div id="board-section"></div>
            <div id="char-section">
                <div class="char-box" id="char-0">
                    <span class="char-name"></span>
                </div>
                <div class="char-box" id="char-1">
                    <span class="char-name"></span>
                </div>
                <div class="char-box" id="char-2">
                    <span class="char-name"></span>
                </div>
                <div class="char-box" id="char-3">
                    <span class="char-name"></span>
                </div>
            </div>
        </div>
    </div>
    <div class="modal" id="configModal">
        <div class="modal-content">
            <div class="modal-title">战斗配置</div>
            <div id="configDisplay"></div>
            <button class="modal-close" onclick="closeConfig()">关闭</button>
        </div>
    </div>
    
    <div class="skill-modal" id="skillModal">
        <div class="skill-modal-content">
            <div class="skill-modal-title" id="skillModalTitle">使用技能</div>
            <div class="skill-modal-desc" id="skillModalDesc">技能描述</div>
            <div class="skill-modal-btns">
                <button class="skill-modal-btn cancel" onclick="closeSkillModal()">取消</button>
                <button class="skill-modal-btn confirm" onclick="confirmUseSkill()">确认使用</button>
            </div>
        </div>
    </div>

        <script src="common/auth.js"></script>
        <script src="common/utils.js"></script>
    <script>
        async function checkBattleAuth() {
            const result = await checkAuth();
            return result;
        }

        function goToMain() {
            window.location.href = 'main.html';
        }

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        function showConfig() {
            const config = window.game ? window.game.config : null;
            const modal = document.getElementById('configModal');
            const display = document.getElementById('configDisplay');
            
            if (!config) {
                display.innerHTML = '<div class="config-item"><span class="config-label">游戏未初始化</span></div>';
            } else {
                display.innerHTML = `
                    <div class="config-section">
                        <div class="config-section-title">基础属性</div>
                        <div class="config-item">
                            <span class="config-label">玩家HP</span>
                            <span class="config-value">${config.playerHp}</span>
                        </div>
                        <div class="config-item">
                            <span class="config-label">防御力</span>
                            <span class="config-value">${config.playerDefense}</span>
                        </div>
                        <div class="config-item">
                            <span class="config-label">操作时间</span>
                            <span class="config-value">${config.timeLimit}ms</span>
                        </div>
                    </div>
                    <div class="config-section">
                        <div class="config-section-title">伤害配置</div>
                        <div class="config-item">
                            <span class="config-label" style="color:#ff4444">● 红色(战士)</span>
                            <span class="config-value">${config.baseDamage.melee}</span>
                        </div>
                        <div class="config-item">
                            <span class="config-label" style="color:#4488ff">● 蓝色(弓箭手)</span>
                            <span class="config-value">${config.baseDamage.ranged}</span>
                        </div>
                        <div class="config-item">
                            <span class="config-label" style="color:#ffff44">● 黄色(法师)</span>
                            <span class="config-value">${config.baseDamage.magic}</span>
                        </div>
                        <div class="config-item">
                            <span class="config-label" style="color:#44ff44">● 绿色(回复)</span>
                            <span class="config-value">${config.baseHeal}</span>
                        </div>
                        <div class="config-item">
                            <span class="config-label" style="color:#888">● 灰色(无效)</span>
                            <span class="config-value">${(config.ballProbability.invalid * 100).toFixed(0)}%</span>
                        </div>
                    </div>
                    <div class="config-section">
                        <div class="config-section-title">敌人信息</div>
                        ${(config.enemies || []).map((enemy, i) => `
                            <div class="config-item">
                                <span class="config-label">${escapeHtml(enemy.enemy_name)} (${i + 1})</span>
                                <span class="config-value">HP:${enemy.hp} ATK:${enemy.attack}</span>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
            
            modal.classList.add('show');
        }

        function closeConfig() {
            document.getElementById('configModal').classList.remove('show');
        }

        let currentSkillCharIndex = null;

        function showSkillModal(charIndex) {
            const game = window.game;
            if (!game || !game.characters[charIndex]) return;
            
            const char = game.characters[charIndex];
            if (!char.active_skill || game.skillUsed[charIndex]) return;
            
            currentSkillCharIndex = charIndex;
            document.getElementById('skillModalTitle').textContent = char.active_skill.name;
            document.getElementById('skillModalDesc').textContent = char.active_skill.desc;
            document.getElementById('skillModal').classList.add('show');
        }

        function closeSkillModal() {
            document.getElementById('skillModal').classList.remove('show');
            currentSkillCharIndex = null;
        }

        function confirmUseSkill() {
            const game = window.game;
            if (game && currentSkillCharIndex !== null) {
                game.useActiveSkill(currentSkillCharIndex);
            }
            closeSkillModal();
        }

        async function loadBattleConfig() {
            const levelId = getQueryParam('level_id');
            const teamId = getQueryParam('team_id');

            if (!levelId || !teamId) {
                window.location.href = 'main.html';
                return null;
            }

            try {
                const [levelRes, teamsRes] = await Promise.all([
                    apiFetch(`/levels/${levelId}`),
                    apiFetch('/teams')
                ]);

                if (!levelRes || !levelRes.ok || !teamsRes || !teamsRes.ok) {
                    window.location.href = 'main.html';
                    return null;
                }

                const level = await levelRes.json();
                const teams = await teamsRes.json();
                const team = teams.find(t => t.id == teamId);

                if (!team) {
                    window.location.href = 'main.html';
                    return null;
                }

                return { level, team };
            } catch (e) {
                console.error('Failed to load battle config:', e);
                window.location.href = 'main.html';
                return null;
            }
        }

        checkBattleAuth();
    </script>
    <script type="module" src="game/main.js"></script>
</body>
</html>
