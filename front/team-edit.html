<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>编辑队伍</title>
    <link rel="stylesheet" href="common/common.css">
    <style>
        .page-header { gap: 10px; }
        .header-title { flex: 1; text-align: center; }
        .save-btn {
            min-width: 60px;
            background: #44aa44;
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
        }
        .save-btn:active { transform: scale(0.95); }
        .team-section {
            padding: 15px;
            background: #252545;
        }
        .team-name-input {
            width: 100%;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .team-slots {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .team-slot {
            width: 70px;
            height: 95px;
            background: #333;
            border: 2px dashed #666;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .team-slot.filled {
            border-style: solid;
        }
        .team-slot.warrior { border-color: #ff4444; background: rgba(255,68,68,0.2); }
        .team-slot.archer { border-color: #4488ff; background: rgba(68,136,255,0.2); }
        .team-slot.mage { border-color: #ffff44; background: rgba(255,255,68,0.2); }
        .slot-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            background: #f44;
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 14px;
            line-height: 20px;
            cursor: pointer;
            display: none;
        }
        .team-slot.filled .slot-remove {
            display: block;
        }
        .slot-num {
            font-size: 10px;
            color: #888;
            margin-bottom: 3px;
        }
        .slot-char-name {
            font-size: 11px;
            color: #fff;
            text-align: center;
            max-width: 65px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .slot-char-type {
            font-size: 9px;
            color: #aaa;
        }
        .slot-skill {
            font-size: 8px;
            color: #aaa;
            max-width: 65px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .slot-empty {
            font-size: 24px;
            color: #444;
        }
        .action-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #3a3a5e;
            border-radius: 10px;
            padding: 15px;
            z-index: 200;
            display: none;
            min-width: 200px;
        }
        .action-menu.show {
            display: block;
        }
        .action-menu-title {
            font-size: 14px;
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #555;
        }
        .action-menu-item {
            background: #252545;
            border: none;
            color: #fff;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .action-menu-item:last-child {
            margin-bottom: 0;
        }
        .action-menu-item:hover {
            background: #353555;
        }
        .action-menu-item.danger {
            color: #f44;
        }

        .char-section {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .char-section-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .sort-btns {
            display: flex;
            gap: 6px;
        }
        .sort-btn {
            padding: 4px 10px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            color: #aaa;
            font-size: 11px;
            cursor: pointer;
        }
        .sort-btn.active {
            background: #4488ff;
            border-color: #4488ff;
            color: #fff;
        }
        .char-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .char-card {
            background: #3a3a5e;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            border: 2px solid transparent;
            cursor: grab;
            transition: all 0.2s;
        }
        .char-card:active {
            cursor: grabbing;
        }
        .char-card.selected {
            border-color: #fff;
            background: #4a4a6e;
        }
        .char-card.dragging {
            opacity: 0.5;
        }
        .char-card.warrior { border-left: 3px solid #ff4444; }
        .char-card.archer { border-left: 3px solid #4488ff; }
        .char-card.mage { border-left: 3px solid #ffff44; }
        .char-card.used {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .char-name {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 3px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .rarity-badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: normal; }
        .rarity-normal { background: #555; color: #aaa; }
        .rarity-advanced { background: #2a6e2a; color: #8f8; }
        .rarity-rare { background: #2a2a6e; color: #88f; }
        .rarity-legendary { background: #6e4a2a; color: #fa4; }
        .char-type {
            font-size: 11px;
            color: #aaa;
        }
        .char-bonus {
            font-size: 9px;
            color: #ccc;
            margin-top: 2px;
        }
        .skill-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: #2a2a4e;
            border-top: 2px solid #444;
            border-radius: 15px 15px 0 0;
            padding: 15px;
            z-index: 100;
            display: none;
        }
        .skill-panel.show {
            display: block;
        }
        .skill-panel-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-align: center;
        }
        .skill-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .skill-tab {
            background: #333;
            border: none;
            color: #888;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        .skill-tab.active {
            background: #555;
            color: #fff;
        }
        .skill-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .skill-item {
            background: #3a3a5e;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 10px;
            min-width: 80px;
            text-align: center;
            cursor: pointer;
        }
        .skill-item.selected {
            border-color: #fff;
            background: #4a4a6e;
        }
        .skill-item:hover {
            background: #4a4a6e;
        }
        .skill-name {
            font-size: 12px;
            color: #fff;
            margin-bottom: 3px;
        }
        .skill-desc {
            font-size: 10px;
            color: #aaa;
        }
        .skill-close {
            display: block;
            width: 100%;
            margin-top: 10px;
            background: #444;
            border: none;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <button class="back-btn" onclick="goBack()">返回</button>
            <span class="header-title" id="pageTitle">编辑队伍</span>
            <button class="save-btn" onclick="saveTeam()">保存</button>
        </div>
        <div class="team-section">
            <input type="text" class="team-name-input" id="teamName" placeholder="队伍名称">
            <div class="team-slots" id="teamSlots"></div>
        </div>
        <div class="char-section">
            <div class="char-section-title">
                <span>点击角色放入队伍</span>
                <div class="sort-btns">
                    <button class="sort-btn active" onclick="setCharSort('default', this)">默认</button>
                    <button class="sort-btn" onclick="setCharSort('rarity_desc', this)">稀有度↓</button>
                    <button class="sort-btn" onclick="setCharSort('rarity_asc', this)">稀有度↑</button>
                </div>
            </div>
            <div class="char-list" id="charList"></div>
        </div>
    </div>

    <div class="skill-panel" id="skillPanel">
        <div class="skill-panel-title" id="skillPanelTitle">选择技能</div>
        <div class="skill-tabs">
            <button class="skill-tab active" id="tabPassive" onclick="switchSkillTab('passive')">被动技能</button>
            <button class="skill-tab" id="tabActive" onclick="switchSkillTab('active')">主动技能</button>
        </div>
        <div class="skill-list" id="skillList"></div>
        <button class="skill-close" onclick="closeSkillPanel()">关闭</button>
    </div>


    <script src="common/auth.js"></script>
    <script src="common/utils.js"></script>
    <script>
        let teamId = null;
        let teamData = null;
        let allChars = [];
        let selectedSlot = null;
        let currentSkillChar = null;
        let skillsCache = {};
        let activeSkillsCache = {};
        let currentSkillTab = 'passive';

        let currentCharSort = 'default';
        const rarityOrder = { legendary: 4, rare: 3, advanced: 2, normal: 1 };

        function setCharSort(sort, btn) {
            currentCharSort = sort;
            btn.closest('.sort-btns').querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderChars();
        }

        function goBack() {
            window.location.href = 'team.html';
        }

        async function loadData() {
            const params = new URLSearchParams(window.location.search);
            teamId = params.get('team_id');

            const [teamsRes, charsRes] = await Promise.all([
                teamId ? apiFetch('/teams') : Promise.resolve(null),
                apiFetch('/characters')
            ]);

            if (charsRes && charsRes.ok) {
                const charsData = await charsRes.json();
                allChars = charsData.characters || charsData;
            }

            if (teamId && teamsRes && teamsRes.ok) {
                const teams = await teamsRes.json();
                teamData = teams.find(t => t.id == teamId);
                if (teamData) {
                    document.getElementById('teamName').value = teamData.team_name;
                    const typeIds = [...new Set(teamData.characters.map(c => c.character_type_id))];
                    for (const typeId of typeIds) {
                        await loadSkillsForType(typeId);
                        await loadActiveSkillsForType(typeId);
                    }
                }
            } else {
                teamData = { id: null, characters: [] };
            }

            renderSlots();
            renderChars();
        }

        async function loadSkillsForType(characterTypeId) {
            if (skillsCache[characterTypeId]) return skillsCache[characterTypeId];
            const res = await apiFetch(`/skills/${characterTypeId}`);
            const skills = res && res.ok ? await res.json() : [];
            skillsCache[characterTypeId] = skills;
            return skills;
        }

        async function loadActiveSkillsForType(characterTypeId) {
            if (activeSkillsCache[characterTypeId]) return activeSkillsCache[characterTypeId];
            const res = await apiFetch(`/skills/${characterTypeId}/active`);
            const skills = res && res.ok ? await res.json() : [];
            activeSkillsCache[characterTypeId] = skills;
            return skills;
        }

        function renderSlots() {
            const typeNames = { 1: '战士', 2: '弓箭手', 3: '法师' };
            const typeClass = { 1: 'warrior', 2: 'archer', 3: 'mage' };
            const rarityNames = { normal: '普通', advanced: '高级', rare: '稀有', legendary: '传说' };

            const slotsHtml = [0,1,2,3].map(i => {
                const c = teamData.characters.find(ch => ch.slot_position === i);
                if (c) {
                    let passiveSkillName = null;
                    if (c.rarity === 'legendary' && c.bound_passive_skill_id && c.passive_skill_name) {
                        passiveSkillName = c.passive_skill_name;
                    } else if (c.passive_skill_id && skillsCache[c.character_type_id]) {
                        passiveSkillName = skillsCache[c.character_type_id].find(s => s.id == c.passive_skill_id)?.name;
                    }
                    const activeSkillName = c.active_skill_id && activeSkillsCache[c.character_type_id] 
                        ? activeSkillsCache[c.character_type_id].find(s => s.id == c.active_skill_id)?.name 
                        : null;
                    const rarity = c.rarity || 'normal';
                    return `<div class="team-slot filled ${typeClass[c.character_type_id]}"
                                onclick="selectSlotChar(${i})" data-slot="${i}">
                                <button class="slot-remove" onclick="event.stopPropagation(); removeFromSlot(${i})">×</button>
                                <div class="slot-num">位置${i+1}</div>
                                <div class="slot-char-name">${escapeHtml(c.character_name)} <span class="rarity-badge rarity-${rarity}" style="font-size:8px">${rarityNames[rarity]}</span></div>
                                <div class="slot-char-type">${typeNames[c.character_type_id] || ''}</div>
                                <div class="slot-skill">被动: ${passiveSkillName ? escapeHtml(passiveSkillName) : '无'}${c.bound_passive_skill_id ? ' 🔒' : ''}</div>
                                <div class="slot-skill">主动: ${activeSkillName ? escapeHtml(activeSkillName) : '无'}</div>
                            </div>`;
                } else {
                    return `<div class="team-slot ${selectedSlot === i ? 'selected' : ''}"
                                onclick="selectSlot(${i})" data-slot="${i}">
                                <span class="slot-empty">+</span>
                            </div>`;
                }
            }).join('');

            document.getElementById('teamSlots').innerHTML = slotsHtml;
            document.getElementById('pageTitle').textContent = teamId ? '编辑队伍' : '新建队伍';
        }

        function renderChars() {
            const typeNames = { 1: '战士', 2: '弓箭手', 3: '法师' };
            const typeClass = { 1: 'warrior', 2: 'archer', 3: 'mage' };
            const rarityNames = { normal: '普通', advanced: '高级', rare: '稀有', legendary: '传说' };
            const usedCharIds = teamData.characters.map(c => c.character_id);

            let sorted = [...allChars];
            if (currentCharSort === 'rarity_desc') {
                sorted.sort((a, b) => (rarityOrder[b.rarity] || 0) - (rarityOrder[a.rarity] || 0));
            } else if (currentCharSort === 'rarity_asc') {
                sorted.sort((a, b) => (rarityOrder[a.rarity] || 0) - (rarityOrder[b.rarity] || 0));
            }

            const charsHtml = sorted.map(c => {
                const isUsed = usedCharIds.includes(c.id);
                const rarity = c.rarity || 'normal';
                const bonuses = [];
                if (c.attack_bonus > 0) bonuses.push(`攻+${c.attack_bonus}`);
                if (c.defense_bonus > 0) bonuses.push(`防+${c.defense_bonus}`);
                if (c.recovery_bonus > 0) bonuses.push(`回+${c.recovery_bonus}`);
                if (c.hp_bonus > 0) bonuses.push(`血+${c.hp_bonus}`);
                if (c.operation_time_bonus > 0) bonuses.push(`时+${c.operation_time_bonus}`);
                const bonusHtml = bonuses.length > 0
                    ? `<div class="char-bonus">${bonuses.join(' ')}</div>` : '';
                return `<div class="char-card ${typeClass[c.character_type_id]} ${isUsed ? 'used' : ''}"
                            onclick="${isUsed ? '' : `addToSlot(${c.id})`}">
                            <div class="char-name">${escapeHtml(c.character_name)} <span class="rarity-badge rarity-${rarity}">${rarityNames[rarity]}</span></div>
                            <div class="char-type">${typeNames[c.character_type_id] || ''}</div>
                            ${bonusHtml}
                        </div>`;
            }).join('');

            document.getElementById('charList').innerHTML = charsHtml;
        }

        function selectSlot(slotIndex) {
            selectedSlot = slotIndex;
            renderSlots();
        }

        function selectSlotChar(slotIndex) {
            const char = teamData.characters.find(c => c.slot_position === slotIndex);
            if (!char) return;
            currentSkillChar = char;
            currentSkillTab = 'passive';
            document.getElementById('tabPassive').classList.add('active');
            document.getElementById('tabActive').classList.remove('active');
            showSkillPanel(char.character_type_id, char.passive_skill_id, char.active_skill_id);
        }

        function switchSkillTab(tab) {
            if (!currentSkillChar) return;
            currentSkillTab = tab;
            document.getElementById('tabPassive').classList.toggle('active', tab === 'passive');
            document.getElementById('tabActive').classList.toggle('active', tab === 'active');
            
            if (tab === 'passive') {
                showSkillPanel(currentSkillChar.character_type_id, currentSkillChar.passive_skill_id, currentSkillChar.active_skill_id);
            } else {
                showSkillPanel(currentSkillChar.character_type_id, currentSkillChar.passive_skill_id, currentSkillChar.active_skill_id);
            }
        }

        async function showSkillPanel(characterTypeId, passiveSkillId, activeSkillId) {
            const passiveSkills = await loadSkillsForType(characterTypeId);
            const activeSkills = await loadActiveSkillsForType(characterTypeId);
            const typeNames = { 1: '战士', 2: '弓箭手', 3: '法师' };
            const isLegendary = currentSkillChar && currentSkillChar.rarity === 'legendary';
            const isPassiveTab = currentSkillTab === 'passive';

            let skills, selectedId, titleSuffix;

            if (isPassiveTab && isLegendary && currentSkillChar.bound_passive_skill_id) {
                skills = [{ id: currentSkillChar.bound_passive_skill_id, name: currentSkillChar.passive_skill_name, description: currentSkillChar.passive_skill_desc }];
                selectedId = currentSkillChar.bound_passive_skill_id;
                titleSuffix = '专属被动 (不可修改)';
            } else {
                skills = isPassiveTab ? passiveSkills : activeSkills;
                selectedId = isPassiveTab ? passiveSkillId : activeSkillId;
                titleSuffix = isPassiveTab ? '被动技能' : '主动技能';
            }

            document.getElementById('skillPanelTitle').textContent = `${typeNames[characterTypeId]} - ${titleSuffix}`;

            const skillsHtml = skills.length > 0 ? skills.map(s => `
                <div class="skill-item ${selectedId == s.id ? 'selected' : ''}" onclick="selectSkill(${s.id})">
                    <div class="skill-name">${escapeHtml(s.name)}</div>
                    <div class="skill-desc">${escapeHtml(s.description)}</div>
                </div>
            `).join('') : '<div style="color:#888;text-align:center;padding:20px;">暂无可用技能</div>';

            document.getElementById('skillList').innerHTML = skillsHtml;
            document.getElementById('skillPanel').classList.add('show');
        }

        function selectSkill(skillId) {
            if (!currentSkillChar) return;

            if (currentSkillTab === 'passive' && currentSkillChar.bound_passive_skill_id) {
                return;
            }

            const skill = (currentSkillTab === 'passive' 
                ? skillsCache[currentSkillChar.character_type_id]
                : activeSkillsCache[currentSkillChar.character_type_id]
            )?.find(s => s.id == skillId);
            
            if (skill?.name === '连锁闪电') {
                for (const c of teamData.characters) {
                    if (c !== currentSkillChar) {
                        if (c.passive_skill_id == skillId) c.passive_skill_id = null;
                        if (c.active_skill_id == skillId) c.active_skill_id = null;
                    }
                }
            }

            if (currentSkillTab === 'passive') {
                currentSkillChar.passive_skill_id = currentSkillChar.passive_skill_id === skillId ? null : skillId;
            } else {
                currentSkillChar.active_skill_id = currentSkillChar.active_skill_id === skillId ? null : skillId;
            }
            renderSlots();
            showSkillPanel(currentSkillChar.character_type_id, currentSkillChar.passive_skill_id, currentSkillChar.active_skill_id);
        }

        function closeSkillPanel() {
            document.getElementById('skillPanel').classList.remove('show');
            currentSkillChar = null;
        }

        function addToSlot(charId) {
            if (selectedSlot === null) {
                const emptySlot = [0,1,2,3].find(i => !teamData.characters.find(c => c.slot_position === i));
                if (emptySlot !== undefined) {
                    selectedSlot = emptySlot;
                } else {
                    alert('队伍已满');
                    return;
                }
            }

            const char = allChars.find(c => c.id === charId);
            if (!char) return;

            const existingIndex = teamData.characters.findIndex(c => c.slot_position === selectedSlot);
            if (existingIndex >= 0) {
                teamData.characters.splice(existingIndex, 1);
            }

            teamData.characters.push({
                slot_position: selectedSlot,
                character_id: char.id,
                character_name: char.character_name,
                character_type_id: char.character_type_id,
                rarity: char.rarity || 'normal',
                attack_bonus: char.attack_bonus || 0,
                defense_bonus: char.defense_bonus || 0,
                recovery_bonus: char.recovery_bonus || 0,
                hp_bonus: char.hp_bonus || 0,
                operation_time_bonus: char.operation_time_bonus || 0,
                bound_passive_skill_id: char.bound_passive_skill_id || null,
                passive_skill_id: char.bound_passive_skill_id || null,
                passive_skill_name: char.bound_skill_name || null,
                passive_skill_desc: char.bound_skill_desc || null,
                active_skill_id: null
            });

            selectedSlot = null;
            renderSlots();
            renderChars();
        }

        function removeFromSlot(slotIndex) {
            teamData.characters = teamData.characters.filter(c => c.slot_position !== slotIndex);
            renderSlots();
            renderChars();
        }

        async function saveTeam() {
            const teamName = document.getElementById('teamName').value.trim();
            if (!teamName) {
                alert('请输入队伍名称');
                return;
            }

            if (teamData.characters.length !== 4) {
                alert('请选择4个角色');
                return;
            }

            let chainLightningCount = 0;
            for (const c of teamData.characters) {
                const passiveSkills = skillsCache[c.character_type_id] || [];
                const activeSkills = activeSkillsCache[c.character_type_id] || [];
                const passiveName = passiveSkills.find(s => s.id == c.passive_skill_id)?.name;
                const activeName = activeSkills.find(s => s.id == c.active_skill_id)?.name;
                if (passiveName === '连锁闪电' || activeName === '连锁闪电') {
                    chainLightningCount++;
                }
            }
            if (chainLightningCount > 1) {
                alert('连锁闪电只能有一个角色装备');
                return;
            }

            const headers = { 'Content-Type': 'application/json' };

            try {
                const payload = {
                    team_name: teamName,
                    characters: teamData.characters.map(c => ({
                        character_id: String(c.character_id),
                        slot_position: c.slot_position,
                        passive_skill_id: c.passive_skill_id ? Number(c.passive_skill_id) : null,
                        active_skill_id: c.active_skill_id ? Number(c.active_skill_id) : null
                    }))
                };
                if (teamId) {
                    await apiFetch(`/teams/${teamId}/update`, {
                        method: 'POST',
                        headers,
                        body: JSON.stringify(payload)
                    });
                } else {
                    const res = await apiFetch('/teams', {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({ team_name: teamName })
                    });
                    if (res && res.ok) {
                        const data = await res.json();
                        teamId = data.id;
                        await apiFetch(`/teams/${teamId}/update`, {
                            method: 'POST',
                            headers,
                            body: JSON.stringify({ characters: payload.characters })
                        });
                    }
                }
                window.location.href = 'team.html';
            } catch (e) {
                alert('保存失败');
            }
        }

        loadData();
    </script>
</body>
</html>
