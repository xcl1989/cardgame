<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>编辑队伍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        .container {
            width: 100%;
            height: 100%;
            max-width: 375px;
            margin: 0 auto;
            background: #2a2a4e;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #1a1a2e;
            color: #fff;
        }
        .back-btn {
            background: none;
            border: 1px solid #666;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .save-btn {
            background: #44ff44;
            border: none;
            color: #000;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .header-title {
            font-size: 18px;
            font-weight: bold;
        }
        .team-section {
            padding: 15px;
            background: #252545;
        }
        .team-name-input {
            width: 100%;
            background: #333;
            border: 1px solid #444;
            color: #fff;
            padding: 10px;
            border-radius: 5px;
            font-size: 16px;
            margin-bottom: 15px;
        }
        .team-slots {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .team-slot {
            width: 70px;
            height: 95px;
            background: #333;
            border: 2px dashed #666;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }
        .team-slot.filled {
            border-style: solid;
        }
        .team-slot.warrior { border-color: #ff4444; background: rgba(255,68,68,0.2); }
        .team-slot.archer { border-color: #4488ff; background: rgba(68,136,255,0.2); }
        .team-slot.mage { border-color: #ffff44; background: rgba(255,255,68,0.2); }
        .slot-remove {
            position: absolute;
            top: -8px;
            right: -8px;
            width: 20px;
            height: 20px;
            background: #f44;
            border: none;
            border-radius: 50%;
            color: #fff;
            font-size: 14px;
            line-height: 20px;
            cursor: pointer;
            display: none;
        }
        .team-slot.filled .slot-remove {
            display: block;
        }
        .slot-num {
            font-size: 10px;
            color: #888;
            margin-bottom: 3px;
        }
        .slot-char-name {
            font-size: 11px;
            color: #fff;
            text-align: center;
            max-width: 65px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .slot-char-type {
            font-size: 9px;
            color: #aaa;
        }
        .slot-skill {
            font-size: 8px;
            color: #aaa;
            max-width: 65px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .slot-empty {
            font-size: 24px;
            color: #444;
        }
        .action-menu {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #3a3a5e;
            border-radius: 10px;
            padding: 15px;
            z-index: 200;
            display: none;
            min-width: 200px;
        }
        .action-menu.show {
            display: block;
        }
        .action-menu-title {
            font-size: 14px;
            color: #fff;
            text-align: center;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px solid #555;
        }
        .action-menu-item {
            background: #252545;
            border: none;
            color: #fff;
            padding: 12px;
            width: 100%;
            border-radius: 5px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .action-menu-item:last-child {
            margin-bottom: 0;
        }
        .action-menu-item:hover {
            background: #353555;
        }
        .action-menu-item.danger {
            color: #f44;
        }

        .char-section {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .char-section-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
        }
        .char-list {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .char-card {
            background: #3a3a5e;
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            border: 2px solid transparent;
            cursor: grab;
            transition: all 0.2s;
        }
        .char-card:active {
            cursor: grabbing;
        }
        .char-card.selected {
            border-color: #fff;
            background: #4a4a6e;
        }
        .char-card.dragging {
            opacity: 0.5;
        }
        .char-card.warrior { border-left: 3px solid #ff4444; }
        .char-card.archer { border-left: 3px solid #4488ff; }
        .char-card.mage { border-left: 3px solid #ffff44; }
        .char-card.used {
            opacity: 0.4;
            cursor: not-allowed;
        }
        .char-name {
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 3px;
        }
        .char-type {
            font-size: 11px;
            color: #aaa;
        }
        .skill-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 375px;
            margin: 0 auto;
            background: #2a2a4e;
            border-top: 2px solid #444;
            border-radius: 15px 15px 0 0;
            padding: 15px;
            z-index: 100;
            display: none;
        }
        .skill-panel.show {
            display: block;
        }
        .skill-panel-title {
            font-size: 14px;
            color: #888;
            margin-bottom: 10px;
            text-align: center;
        }
        .skill-tabs {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-bottom: 10px;
        }
        .skill-tab {
            background: #333;
            border: none;
            color: #888;
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
        }
        .skill-tab.active {
            background: #555;
            color: #fff;
        }
        .skill-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .skill-item {
            background: #3a3a5e;
            border: 2px solid #555;
            border-radius: 8px;
            padding: 10px;
            min-width: 80px;
            text-align: center;
            cursor: pointer;
        }
        .skill-item.selected {
            border-color: #fff;
            background: #4a4a6e;
        }
        .skill-item:hover {
            background: #4a4a6e;
        }
        .skill-name {
            font-size: 12px;
            color: #fff;
            margin-bottom: 3px;
        }
        .skill-desc {
            font-size: 10px;
            color: #aaa;
        }
        .skill-close {
            display: block;
            width: 100%;
            margin-top: 10px;
            background: #444;
            border: none;
            color: #fff;
            padding: 8px;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">返回</button>
            <span class="header-title" id="pageTitle">编辑队伍</span>
            <button class="save-btn" onclick="saveTeam()">保存</button>
        </div>
        <div class="team-section">
            <input type="text" class="team-name-input" id="teamName" placeholder="队伍名称">
            <div class="team-slots" id="teamSlots"></div>
        </div>
        <div class="char-section">
            <div class="char-section-title">点击角色放入队伍</div>
            <div class="char-list" id="charList"></div>
        </div>
    </div>

    <div class="skill-panel" id="skillPanel">
        <div class="skill-panel-title" id="skillPanelTitle">选择技能</div>
        <div class="skill-tabs">
            <button class="skill-tab active" id="tabPassive" onclick="switchSkillTab('passive')">被动技能</button>
            <button class="skill-tab" id="tabActive" onclick="switchSkillTab('active')">主动技能</button>
        </div>
        <div class="skill-list" id="skillList"></div>
        <button class="skill-close" onclick="closeSkillPanel()">关闭</button>
    </div>


    <script>
        const API_BASE = '/api';
        let teamId = null;
        let teamData = null;
        let allChars = [];
        let selectedSlot = null;
        let skillsCache = {};
        let activeSkillsCache = {};
        let currentSkillTab = 'passive';

        function goBack() {
            window.location.href = 'team.html';
        }

        async function loadData() {
            const token = localStorage.getItem('token');
            const params = new URLSearchParams(window.location.search);
            teamId = params.get('team_id');

            const headers = { 'Authorization': `Bearer ${token}` };

            const [teamsRes, charsRes] = await Promise.all([
                teamId ? fetch(`${API_BASE}/teams`, { headers }) : Promise.resolve(null),
                fetch(`${API_BASE}/characters`, { headers })
            ]);

            allChars = await charsRes.json();

            if (teamId) {
                const teams = await teamsRes.json();
                teamData = teams.find(t => t.id == teamId);
                if (teamData) {
                    document.getElementById('teamName').value = teamData.team_name;
                    const typeIds = [...new Set(teamData.characters.map(c => c.character_type_id))];
                    for (const typeId of typeIds) {
                        await loadSkillsForType(typeId);
                        await loadActiveSkillsForType(typeId);
                    }
                }
            } else {
                teamData = { id: null, characters: [] };
            }

            renderSlots();
            renderChars();
        }

        async function loadSkillsForType(characterTypeId) {
            if (skillsCache[characterTypeId]) {
                return skillsCache[characterTypeId];
            }
            const token = localStorage.getItem('token');
            const res = await fetch(`${API_BASE}/skills/${characterTypeId}`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const skills = await res.json();
            skillsCache[characterTypeId] = skills;
            return skills;
        }

        async function loadActiveSkillsForType(characterTypeId) {
            if (activeSkillsCache[characterTypeId]) {
                return activeSkillsCache[characterTypeId];
            }
            const token = localStorage.getItem('token');
            const res = await fetch(`${API_BASE}/skills/${characterTypeId}/active`, {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const skills = await res.json();
            activeSkillsCache[characterTypeId] = skills;
            return skills;
        }

        function renderSlots() {
            const typeNames = { 1: '战士', 2: '弓箭手', 3: '法师' };
            const typeClass = { 1: 'warrior', 2: 'archer', 3: 'mage' };

            const slotsHtml = [0,1,2,3].map(i => {
                const c = teamData.characters.find(ch => ch.slot_position === i);
                if (c) {
                    const passiveSkillName = c.passive_skill_id && skillsCache[c.character_type_id] 
                        ? skillsCache[c.character_type_id].find(s => s.id == c.passive_skill_id)?.name 
                        : null;
                    const activeSkillName = c.active_skill_id && activeSkillsCache[c.character_type_id] 
                        ? activeSkillsCache[c.character_type_id].find(s => s.id == c.active_skill_id)?.name 
                        : null;
                    return `<div class="team-slot filled ${typeClass[c.character_type_id]}"
                                onclick="selectSlotChar(${i})" data-slot="${i}">
                                <button class="slot-remove" onclick="event.stopPropagation(); removeFromSlot(${i})">×</button>
                                <div class="slot-num">位置${i+1}</div>
                                <div class="slot-char-name">${c.character_name}</div>
                                <div class="slot-char-type">${typeNames[c.character_type_id]}</div>
                                <div class="slot-skill">被动: ${passiveSkillName || '无'}</div>
                                <div class="slot-skill">主动: ${activeSkillName || '无'}</div>
                            </div>`;
                } else {
                    return `<div class="team-slot ${selectedSlot === i ? 'selected' : ''}"
                                onclick="selectSlot(${i})" data-slot="${i}">
                                <span class="slot-empty">+</span>
                            </div>`;
                }
            }).join('');

            document.getElementById('teamSlots').innerHTML = slotsHtml;
            document.getElementById('pageTitle').textContent = teamId ? '编辑队伍' : '新建队伍';
        }

        function renderChars() {
            const typeNames = { 1: '战士', 2: '弓箭手', 3: '法师' };
            const typeClass = { 1: 'warrior', 2: 'archer', 3: 'mage' };
            const usedCharIds = teamData.characters.map(c => c.character_id);

            const charsHtml = allChars.map(c => {
                const isUsed = usedCharIds.includes(c.id);
                return `<div class="char-card ${typeClass[c.character_type_id]} ${isUsed ? 'used' : ''}"
                            onclick="${isUsed ? '' : `addToSlot(${c.id})`}">
                            <div class="char-name">${c.character_name}</div>
                            <div class="char-type">${typeNames[c.character_type_id]}</div>
                        </div>`;
            }).join('');

            document.getElementById('charList').innerHTML = charsHtml;
        }

        function selectSlot(slotIndex) {
            selectedSlot = slotIndex;
            renderSlots();
        }

        function selectSlotChar(slotIndex) {
            const char = teamData.characters.find(c => c.slot_position === slotIndex);
            if (!char) return;
            currentSkillChar = char;
            currentSkillTab = 'passive';
            document.getElementById('tabPassive').classList.add('active');
            document.getElementById('tabActive').classList.remove('active');
            showSkillPanel(char.character_type_id, char.passive_skill_id, char.active_skill_id);
        }

        function switchSkillTab(tab) {
            if (!currentSkillChar) return;
            currentSkillTab = tab;
            document.getElementById('tabPassive').classList.toggle('active', tab === 'passive');
            document.getElementById('tabActive').classList.toggle('active', tab === 'active');
            
            if (tab === 'passive') {
                showSkillPanel(currentSkillChar.character_type_id, currentSkillChar.passive_skill_id, currentSkillChar.active_skill_id);
            } else {
                showSkillPanel(currentSkillChar.character_type_id, currentSkillChar.passive_skill_id, currentSkillChar.active_skill_id);
            }
        }

        async function showSkillPanel(characterTypeId, passiveSkillId, activeSkillId) {
            const passiveSkills = await loadSkillsForType(characterTypeId);
            const activeSkills = await loadActiveSkillsForType(characterTypeId);
            const typeNames = { 1: '战士', 2: '弓箭手', 3: '法师' };

            const skills = currentSkillTab === 'passive' ? passiveSkills : activeSkills;
            const selectedId = currentSkillTab === 'passive' ? passiveSkillId : activeSkillId;

            document.getElementById('skillPanelTitle').textContent = `${typeNames[characterTypeId]} - ${currentSkillTab === 'passive' ? '被动技能' : '主动技能'}`;

            const skillsHtml = skills.length > 0 ? skills.map(s => `
                <div class="skill-item ${selectedId == s.id ? 'selected' : ''}" onclick="selectSkill(${s.id})">
                    <div class="skill-name">${s.name}</div>
                    <div class="skill-desc">${s.description}</div>
                </div>
            `).join('') : '<div style="color:#888;text-align:center;padding:20px;">暂无可用技能</div>';

            document.getElementById('skillList').innerHTML = skillsHtml;
            document.getElementById('skillPanel').classList.add('show');
        }

        function selectSkill(skillId) {
            if (!currentSkillChar) return;

            const skill = (currentSkillTab === 'passive' 
                ? skillsCache[currentSkillChar.character_type_id]
                : activeSkillsCache[currentSkillChar.character_type_id]
            )?.find(s => s.id == skillId);
            
            if (skill?.name === '连锁闪电') {
                for (const c of teamData.characters) {
                    if (c !== currentSkillChar) {
                        if (c.passive_skill_id == skillId) c.passive_skill_id = null;
                        if (c.active_skill_id == skillId) c.active_skill_id = null;
                    }
                }
            }

            if (currentSkillTab === 'passive') {
                currentSkillChar.passive_skill_id = currentSkillChar.passive_skill_id === skillId ? null : skillId;
            } else {
                currentSkillChar.active_skill_id = currentSkillChar.active_skill_id === skillId ? null : skillId;
            }
            closeSkillPanel();
            renderSlots();
        }

        function closeSkillPanel() {
            document.getElementById('skillPanel').classList.remove('show');
            currentSkillChar = null;
        }

        function addToSlot(charId) {
            if (selectedSlot === null) {
                const emptySlot = [0,1,2,3].find(i => !teamData.characters.find(c => c.slot_position === i));
                if (emptySlot !== undefined) {
                    selectedSlot = emptySlot;
                } else {
                    alert('队伍已满');
                    return;
                }
            }

            const char = allChars.find(c => c.id === charId);
            if (!char) return;

            const existingIndex = teamData.characters.findIndex(c => c.slot_position === selectedSlot);
            if (existingIndex >= 0) {
                teamData.characters.splice(existingIndex, 1);
            }

            teamData.characters.push({
                slot_position: selectedSlot,
                character_id: char.id,
                character_name: char.character_name,
                character_type_id: char.character_type_id,
                passive_skill_id: null,
                active_skill_id: null
            });

            selectedSlot = null;
            renderSlots();
            renderChars();
        }

        function removeFromSlot(slotIndex) {
            teamData.characters = teamData.characters.filter(c => c.slot_position !== slotIndex);
            renderSlots();
            renderChars();
        }

        async function saveTeam() {
            const token = localStorage.getItem('token');
            const teamName = document.getElementById('teamName').value.trim();
            if (!teamName) {
                alert('请输入队伍名称');
                return;
            }

            if (teamData.characters.length !== 4) {
                alert('请选择4个角色');
                return;
            }

            // 检查连锁闪电只能有一个角色装备
            let chainLightningCount = 0;
            for (const c of teamData.characters) {
                const passiveSkills = skillsCache[c.character_type_id] || [];
                const activeSkills = activeSkillsCache[c.character_type_id] || [];
                const passiveName = passiveSkills.find(s => s.id == c.passive_skill_id)?.name;
                const activeName = activeSkills.find(s => s.id == c.active_skill_id)?.name;
                if (passiveName === '连锁闪电' || activeName === '连锁闪电') {
                    chainLightningCount++;
                }
            }
            if (chainLightningCount > 1) {
                alert('连锁闪电只能有一个角色装备');
                return;
            }

            const headers = {
                'Authorization': `Bearer ${token}`,
                'Content-Type': 'application/json'
            };

            try {
                if (teamId) {
                    await fetch(`${API_BASE}/teams/${teamId}`, {
                        method: 'PUT',
                        headers,
                        body: JSON.stringify({
                            team_name: teamName,
                            characters: teamData.characters
                        })
                    });
                } else {
                    const res = await fetch(`${API_BASE}/teams`, {
                        method: 'POST',
                        headers,
                        body: JSON.stringify({ team_name: teamName })
                    });
                    const data = await res.json();
                    teamId = data.id;
                    await fetch(`${API_BASE}/teams/${teamId}`, {
                        method: 'PUT',
                        headers,
                        body: JSON.stringify({ characters: teamData.characters })
                    });
                }
                window.location.href = 'team.html';
            } catch (e) {
                alert('保存失败');
            }
        }

        loadData();
    </script>
</body>
</html>
