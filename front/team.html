<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>队伍设置</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        .container {
            width: 100%;
            height: 100%;
            max-width: 375px;
            margin: 0 auto;
            background: #2a2a4e;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #1a1a2e;
            color: #fff;
        }
        .back-btn {
            background: none;
            border: 1px solid #666;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .header-title {
            font-size: 18px;
            font-weight: bold;
        }
        .add-btn {
            background: #4488ff;
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .team-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .team-card {
            background: #3a3a5e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
        }
        .team-name {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team-name button {
            background: #666;
            border: none;
            color: #fff;
            padding: 5px 10px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }
        .team-chars {
            display: flex;
            gap: 8px;
        }
        .team-char {
            width: 60px;
            height: 70px;
            background: #252545;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid;
        }
        .team-char.warrior { border-color: #ff4444; }
        .team-char.archer { border-color: #4488ff; }
        .team-char.mage { border-color: #ffff44; }
        .team-char.empty { border-color: #444; background: #333; }
        .team-char-name {
            font-size: 11px;
            color: #fff;
            text-align: center;
            padding: 0 3px;
        }
        .team-char-type {
            font-size: 9px;
            color: #aaa;
        }
        .empty-msg {
            text-align: center;
            color: #888;
            padding: 50px;
        }
        .empty-slot {
            color: #666;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">返回</button>
            <span class="header-title" id="pageTitle">队伍设置</span>
            <button class="add-btn" onclick="createTeam()">新建队伍</button>
        </div>
        <div class="team-list" id="teamList">
            <div class="empty-msg">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function goBack() {
            window.location.href = 'main.html';
        }

        async function loadTeams() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/teams`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const teams = await res.json();
                    renderTeams(teams);
                } else {
                    document.getElementById('teamList').innerHTML = '<div class="empty-msg">加载失败</div>';
                }
            } catch (e) {
                document.getElementById('teamList').innerHTML = '<div class="empty-msg">加载失败</div>';
            }
        }

        function renderTeams(teams) {
            const list = document.getElementById('teamList');
            const maxTeams = parseInt(localStorage.getItem('max_teams') || '2');
            document.getElementById('pageTitle').textContent = `队伍设置 (${teams.length}/${maxTeams})`;
            
            if (teams.length === 0) {
                list.innerHTML = '<div class="empty-msg">暂无队伍<br>点击"新建队伍"创建一个</div>';
                return;
            }

            const typeNames = { 1: '战士', 2: '弓箭手', 3: '法师' };
            const typeClass = { 1: 'warrior', 2: 'archer', 3: 'mage' };

            list.innerHTML = teams.map(t => `
                <div class="team-card">
                    <div class="team-name">
                        <span>${t.team_name}</span>
                        <button onclick="editTeam(${t.id})">编辑</button>
                    </div>
                    <div class="team-chars">
                        ${[0,1,2,3].map(i => {
                            const c = t.characters.find(ch => ch.slot_position === i);
                            if (c) {
                                return `<div class="team-char ${typeClass[c.character_type_id]}">
                                    <div class="team-char-name">${c.character_name}</div>
                                    <div class="team-char-type">${typeNames[c.character_type_id]}</div>
                                </div>`;
                            } else {
                                return `<div class="team-char empty"><span class="empty-slot">+</span></div>`;
                            }
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function createTeam() {
            const maxTeams = parseInt(localStorage.getItem('max_teams') || '2');
            const currentCount = document.querySelectorAll('.team-card').length;
            if (currentCount >= maxTeams) {
                alert(`最多只能创建${maxTeams}个队伍`);
                return;
            }
            const name = prompt('请输入队伍名称：', '队伍1');
            if (!name) return;

            fetch(`${API_BASE}/teams`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${localStorage.getItem('token')}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ team_name: name })
            }).then(res => res.json()).then(data => {
                window.location.href = `team-edit.html?team_id=${data.id}`;
            });
        }

        function editTeam(teamId) {
            window.location.href = `team-edit.html?team_id=${teamId}`;
        }

        loadTeams();
    </script>
</body>
</html>
