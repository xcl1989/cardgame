<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>队伍设置</title>
    <link rel="stylesheet" href="common/common.css">
    <style>
        .page-header { gap: 10px; }
        .header-title { flex: 1; text-align: center; }
        .add-btn {
            min-width: 60px;
            background: #4488ff;
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .add-btn:active { transform: scale(0.95); }
        .team-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .team-card {
            background: #3a3a5e;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .team-name {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .team-name button {
            background: #555;
            border: none;
            color: #fff;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        .team-name button:hover { background: #666; }
        .team-chars {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .team-char {
            width: 62px;
            height: 72px;
            background: #252545;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid;
        }
        .team-char.warrior { border-color: #ff4444; }
        .team-char.archer { border-color: #4488ff; }
        .team-char.mage { border-color: #ffff44; }
        .team-char.empty { border-color: #444; background: #333; }
        .team-char-name { font-size: 11px; color: #fff; text-align: center; padding: 0 3px; }
        .team-char-type { font-size: 9px; color: #aaa; }
        .empty-slot { color: #666; font-size: 20px; }
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.6);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: #2a2a4e;
            border: 1px solid #5a5a8e;
            border-radius: 14px;
            padding: 24px;
            width: 280px;
            color: #fff;
        }
        .modal-box h3 {
            font-size: 16px;
            text-align: center;
            margin-bottom: 16px;
        }
        .modal-input {
            width: 100%;
            padding: 10px 12px;
            background: #1a1a2e;
            border: 1px solid #3a3a5e;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            outline: none;
            margin-bottom: 16px;
        }
        .modal-input:focus { border-color: #4488ff; }
        .modal-btns {
            display: flex;
            gap: 10px;
        }
        .modal-btns button {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
        }
        .modal-btns .cancel { background: #555; color: #ccc; }
        .modal-btns .confirm { background: #4488ff; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <button class="back-btn" onclick="goBack()">返回</button>
            <span class="header-title" id="pageTitle">队伍设置</span>
            <button class="add-btn" onclick="showCreateModal()">新建</button>
        </div>
        <div class="team-list" id="teamList"></div>
    </div>

    <div class="modal-overlay" id="createModal">
        <div class="modal-box">
            <h3>新建队伍</h3>
            <input type="text" class="modal-input" id="teamNameInput" placeholder="请输入队伍名称" maxlength="20">
            <div class="modal-btns">
                <button class="cancel" onclick="closeCreateModal()">取消</button>
                <button class="confirm" onclick="doCreateTeam()">确认</button>
            </div>
        </div>
    </div>

    <script src="common/auth.js"></script>
    <script src="common/utils.js"></script>
    <script>
        function goBack() {
            window.location.href = 'main.html';
        }

        async function loadTeams() {
            showLoading('teamList');
            try {
                const res = await apiFetch('/teams');
                if (res && res.ok) {
                    const teams = await res.json();
                    renderTeams(teams);
                } else {
                    document.getElementById('teamList').innerHTML = '<div class="empty-msg">加载失败</div>';
                }
            } catch (e) {
                document.getElementById('teamList').innerHTML = '<div class="empty-msg">加载失败</div>';
            }
        }

        function renderTeams(teams) {
            const list = document.getElementById('teamList');
            const maxTeams = parseInt(localStorage.getItem('max_teams') || '2');
            document.getElementById('pageTitle').textContent = `队伍设置 (${teams.length}/${maxTeams})`;

            if (teams.length === 0) {
                list.innerHTML = '<div class="empty-msg">暂无队伍<br>点击"新建"创建一个</div>';
                return;
            }

            const typeNames = { 1: '战士', 2: '弓箭手', 3: '法师' };
            const typeClass = { 1: 'warrior', 2: 'archer', 3: 'mage' };

            list.innerHTML = teams.map(t => `
                <div class="team-card">
                    <div class="team-name">
                        <span>${escapeHtml(t.team_name)}</span>
                        <button onclick="editTeam(${t.id})">编辑</button>
                    </div>
                    <div class="team-chars">
                        ${[0,1,2,3].map(i => {
                            const c = t.characters.find(ch => ch.slot_position === i);
                            if (c) {
                                return `<div class="team-char ${typeClass[c.character_type_id] || ''}">
                                    <div class="team-char-name">${escapeHtml(c.character_name)}</div>
                                    <div class="team-char-type">${typeNames[c.character_type_id] || ''}</div>
                                </div>`;
                            } else {
                                return `<div class="team-char empty"><span class="empty-slot">+</span></div>`;
                            }
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function showCreateModal() {
            const maxTeams = parseInt(localStorage.getItem('max_teams') || '2');
            const currentCount = document.querySelectorAll('.team-card').length;
            if (currentCount >= maxTeams) {
                alert(`最多只能创建${maxTeams}个队伍`);
                return;
            }
            document.getElementById('teamNameInput').value = '';
            document.getElementById('createModal').classList.add('show');
            setTimeout(() => document.getElementById('teamNameInput').focus(), 100);
        }

        function closeCreateModal() {
            document.getElementById('createModal').classList.remove('show');
        }

        async function doCreateTeam() {
            const name = document.getElementById('teamNameInput').value.trim();
            if (!name) return;

            try {
                const res = await apiFetch('/teams', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ team_name: name })
                });
                if (res && res.ok) {
                    const data = await res.json();
                    window.location.href = `team-edit.html?team_id=${data.id}`;
                }
            } catch (e) {
                alert('创建失败');
            }
        }

        document.getElementById('teamNameInput').addEventListener('keypress', e => {
            if (e.key === 'Enter') doCreateTeam();
        });

        function editTeam(teamId) {
            window.location.href = `team-edit.html?team_id=${teamId}`;
        }

        loadTeams();
    </script>
</body>
</html>
