<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>选择关卡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 100%;
            height: 100%;
            max-width: 375px;
            margin: 0 auto;
            background: #2a2a4e;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #1a1a2e;
            color: #fff;
        }
        .back-btn {
            background: none;
            border: 1px solid #666;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .header-title {
            font-size: 18px;
            font-weight: bold;
        }
        .level-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .level-card {
            background: linear-gradient(135deg, #3a3a6e, #2a2a5e);
            border: 2px solid #5a5a8e;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
        }
        .level-card:hover {
            border-color: #8a8aae;
            transform: scale(1.02);
        }
        .level-card:active {
            transform: scale(0.98);
        }
        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .level-card.completed {
            border-color: #44aa44;
        }
        .level-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        .level-info {
            font-size: 14px;
            color: #aaa;
        }
        .level-info span {
            margin-right: 15px;
        }
        .level-status {
            font-size: 12px;
            color: #4f4;
            margin-top: 5px;
        }
        .level-status.locked {
            color: #f66;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">返回</button>
            <span class="header-title">选择关卡</span>
            <div style="width: 60px;"></div>
        </div>
        <div class="level-list" id="levelList">
            <div class="empty-msg">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function goBack() {
            window.location.href = 'main.html';
        }

        async function loadLevels() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/levels`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const levels = await res.json();
                    renderLevels(levels);
                } else {
                    document.getElementById('levelList').innerHTML = '<div class="empty-msg">加载失败</div>';
                }
            } catch (e) {
                document.getElementById('levelList').innerHTML = '<div class="empty-msg">加载失败</div>';
            }
        }

        function renderLevels(levels) {
            const list = document.getElementById('levelList');
            
            if (levels.length === 0) {
                list.innerHTML = '<div class="empty-msg">暂无关卡</div>';
                return;
            }

            list.innerHTML = levels.map(level => `
                <div class="level-card ${level.is_unlocked ? '' : 'locked'} ${level.is_completed ? 'completed' : ''}" onclick="${level.is_unlocked ? `selectLevel(${level.id})` : ''}">
                    <div class="level-name">${level.level_name} ${level.is_completed ? '✓' : ''}</div>
                    <div class="level-info">
                        <span>BOSS: ${level.enemy_name}</span>
                    </div>
                    <div class="level-info">
                        <span>HP: ${level.enemy_hp}</span>
                        <span>攻击力: ${level.enemy_attack}</span>
                        <span>防御力: ${level.enemy_defense}</span>
                    </div>
                    <div class="level-status ${level.is_completed ? '' : 'locked'}">${level.is_completed ? '已通关' : '未通关'}</div>
                </div>
            `).join('');
        }

        function selectLevel(levelId) {
            window.location.href = `team-select.html?level_id=${levelId}`;
        }

        loadLevels();
    </script>
</body>
</html>
