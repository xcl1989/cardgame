<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>选择关卡</title>
    <link rel="stylesheet" href="common/common.css">
    <style>
        .page-header {
            padding: 12px 15px;
            gap: 10px;
        }
        .header-title {
            flex: 1;
            text-align: center;
            font-size: 17px;
            letter-spacing: 1px;
        }
        .back-btn {
            min-width: 60px;
            border-radius: 8px;
            font-size: 14px;
            padding: 8px 14px;
        }
        .header-spacer {
            min-width: 60px;
        }
        .chapter-tabs {
            display: flex;
            overflow-x: auto;
            gap: 8px;
            padding: 0 15px 10px;
            -webkit-overflow-scrolling: touch;
        }
        .chapter-tab {
            padding: 8px 16px;
            border-radius: 8px;
            background: #2a2a5e;
            color: #aaa;
            border: 1px solid #4a4a7e;
            cursor: pointer;
            white-space: nowrap;
            font-size: 14px;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .chapter-tab:active {
            transform: scale(0.95);
        }
        .chapter-tab.active {
            background: #4a4a9e;
            color: #fff;
            border-color: #7a7ade;
        }
        .level-list {
            flex: 1;
            overflow-y: auto;
            padding: 0 15px 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .level-card {
            background: linear-gradient(135deg, #3a3a6e, #2a2a5e);
            border: 2px solid #5a5a8e;
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
        }
        .level-card:hover {
            border-color: #8a8aae;
            transform: scale(1.02);
        }
        .level-card:active {
            transform: scale(0.98);
        }
        .level-card.locked {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .level-card.completed {
            border-color: #44aa44;
        }
        .level-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 8px;
        }
        .level-info {
            font-size: 14px;
            color: #aaa;
        }
        .level-info span {
            margin-right: 15px;
        }
        .level-status {
            font-size: 12px;
            color: #4f4;
            margin-top: 5px;
        }
        .level-status.locked {
            color: #f66;
        }
        .empty-msg {
            text-align: center;
            color: #888;
            padding: 30px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="page-header">
            <button class="back-btn" onclick="goBack()">返回</button>
            <span class="header-title">选择关卡</span>
            <div class="header-spacer"></div>
        </div>
        <div class="chapter-tabs" id="chapterTabs"></div>
        <div class="level-list" id="levelList">
            <div class="empty-msg">加载中...</div>
        </div>
    </div>

    <script src="common/auth.js"></script>
    <script src="common/utils.js"></script>
    <script>
        let chapters = [];
        let activeChapterId = null;

        function goBack() {
            window.location.href = 'main.html';
        }

        async function loadChapters() {
            try {
                const res = await apiFetch('/chapters');
                if (res && res.ok) {
                    chapters = await res.json();
                    if (chapters.length === 0) {
                        document.getElementById('levelList').innerHTML = '<div class="empty-msg">暂无关卡</div>';
                        return;
                    }
                    renderChapterTabs();
                    activeChapterId = chapters[0].id;
                    renderLevels();
                } else {
                    document.getElementById('levelList').innerHTML = '<div class="empty-msg">加载失败</div>';
                }
            } catch (e) {
                document.getElementById('levelList').innerHTML = '<div class="empty-msg">加载失败</div>';
            }
        }

        function renderChapterTabs() {
            const tabsEl = document.getElementById('chapterTabs');
            tabsEl.innerHTML = chapters.map(c => 
                `<div class="chapter-tab ${c.id === activeChapterId ? 'active' : ''}" onclick="switchChapter(${c.id})">${escapeHtml(c.chapter_name)}</div>`
            ).join('');
        }

        function switchChapter(chapterId) {
            activeChapterId = chapterId;
            renderChapterTabs();
            renderLevels();
        }

        function renderLevels() {
            const list = document.getElementById('levelList');
            const chapter = chapters.find(c => c.id === activeChapterId);
            if (!chapter || !chapter.levels || chapter.levels.length === 0) {
                list.innerHTML = '<div class="empty-msg">该章节暂无关卡</div>';
                return;
            }

            list.innerHTML = chapter.levels.map(level => `
                <div class="level-card ${level.is_unlocked ? '' : 'locked'} ${level.is_completed ? 'completed' : ''}" onclick="${level.is_unlocked ? `selectLevel(${level.id})` : ''}">
                    <div class="level-name">${escapeHtml(level.level_name)} ${level.is_completed ? '✓' : ''}</div>
                    <div class="level-info">
                        <span>BOSS: ${escapeHtml(level.enemy_name)}</span>
                    </div>
                    <div class="level-info">
                        <span>HP: ${level.enemy_hp}</span>
                        <span>攻击力: ${level.enemy_attack}</span>
                        <span>防御力: ${level.enemy_defense}</span>
                    </div>
                    <div class="level-status ${level.is_completed ? '' : 'locked'}">${level.is_completed ? '已通关' : '未通关'}</div>
                </div>
            `).join('');
        }

        function selectLevel(levelId) {
            window.location.href = `team-select.html?level_id=${levelId}`;
        }

        loadChapters();
    </script>
</body>
</html>
