<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>选择队伍</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: Arial, sans-serif;
        }
        .container {
            width: 100%;
            height: 100%;
            max-width: 375px;
            margin: 0 auto;
            background: #2a2a4e;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #1a1a2e;
            color: #fff;
        }
        .back-btn {
            background: none;
            border: 1px solid #666;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .header-title {
            font-size: 18px;
            font-weight: bold;
        }
        .confirm-btn {
            background: #44dd88;
            border: none;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        .confirm-btn:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .level-info {
            padding: 15px;
            background: #252545;
            color: #fff;
            text-align: center;
        }
        .level-name {
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .level-detail {
            font-size: 12px;
            color: #aaa;
        }
        .team-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .team-card {
            background: #3a3a5e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 15px;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.2s;
        }
        .team-card:hover {
            border-color: #8a8aae;
        }
        .team-card.selected {
            border-color: #44dd88;
            background: #2a4a3e;
        }
        .team-name {
            font-size: 16px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 10px;
        }
        .team-chars {
            display: flex;
            gap: 8px;
        }
        .team-char {
            width: 60px;
            height: 70px;
            background: #252545;
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid;
        }
        .team-char.warrior { border-color: #ff4444; }
        .team-char.archer { border-color: #4488ff; }
        .team-char.mage { border-color: #ffff44; }
        .team-char.empty { border-color: #444; background: #333; }
        .team-char-name {
            font-size: 11px;
            color: #fff;
            text-align: center;
            padding: 0 3px;
        }
        .team-char-type {
            font-size: 9px;
            color: #aaa;
        }
        .empty-msg {
            text-align: center;
            color: #888;
            padding: 50px;
        }
        .empty-slot {
            color: #666;
            font-size: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">返回</button>
            <span class="header-title">选择队伍</span>
            <button class="confirm-btn" id="confirmBtn" onclick="confirmSelection()" disabled>确认</button>
        </div>
        <div class="level-info" id="levelInfo">
            <div class="level-name" id="levelName">加载中...</div>
            <div class="level-detail" id="levelDetail"></div>
        </div>
        <div class="team-list" id="teamList">
            <div class="empty-msg">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let selectedTeamId = null;
        let levelId = null;

        function goBack() {
            window.location.href = 'level-select.html';
        }

        function getQueryParam(param) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(param);
        }

        async function loadLevel() {
            levelId = getQueryParam('level_id');
            if (!levelId) {
                alert('未选择关卡');
                goBack();
                return;
            }

            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API_BASE}/levels/${levelId}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const level = await res.json();
                    document.getElementById('levelName').textContent = level.level_name;
                    document.getElementById('levelDetail').textContent = `敌人: ${level.enemy_name} | HP: ${level.enemy_hp}`;
                }
            } catch (e) {
                console.error('Failed to load level');
            }
        }

        async function loadTeams() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/teams`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const teams = await res.json();
                    renderTeams(teams);
                } else {
                    document.getElementById('teamList').innerHTML = '<div class="empty-msg">加载失败</div>';
                }
            } catch (e) {
                document.getElementById('teamList').innerHTML = '<div class="empty-msg">加载失败</div>';
            }
        }

        function renderTeams(teams) {
            const list = document.getElementById('teamList');
            
            if (teams.length === 0) {
                list.innerHTML = '<div class="empty-msg">暂无队伍，请先在队伍设置中创建队伍</div>';
                return;
            }

            const typeNames = { 1: '战士', 2: '弓箭手', 3: '法师' };
            const typeClass = { 1: 'warrior', 2: 'archer', 3: 'mage' };

            list.innerHTML = teams.map(t => `
                <div class="team-card" id="team-${t.id}" onclick="selectTeam(${t.id})">
                    <div class="team-name">${t.team_name}</div>
                    <div class="team-chars">
                        ${[0,1,2,3].map(i => {
                            const c = t.characters.find(ch => ch.slot_position === i);
                            if (c) {
                                return `<div class="team-char ${typeClass[c.character_type_id]}">
                                    <div class="team-char-name">${c.character_name}</div>
                                    <div class="team-char-type">${typeNames[c.character_type_id]}</div>
                                </div>`;
                            } else {
                                return `<div class="team-char empty"><span class="empty-slot">+</span></div>`;
                            }
                        }).join('')}
                    </div>
                </div>
            `).join('');
        }

        function selectTeam(teamId) {
            document.querySelectorAll('.team-card').forEach(el => el.classList.remove('selected'));
            document.getElementById(`team-${teamId}`).classList.add('selected');
            selectedTeamId = teamId;
            document.getElementById('confirmBtn').disabled = false;
        }

        function confirmSelection() {
            if (!selectedTeamId || !levelId) return;
            window.location.href = `index.html?level_id=${levelId}&team_id=${selectedTeamId}`;
        }

        loadLevel();
        loadTeams();
    </script>
</body>
</html>
