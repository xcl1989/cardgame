<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>卡牌消除 - 主界面</title>
    <link rel="stylesheet" href="common/common.css">
    <style>
        .main-container {
            width: 100%;
            height: 100%;
            max-width: 375px;
            margin: 0 auto;
            background: #2a2a4e;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .header {
            height: 60px;
            background: #252545;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #3a3a5e;
        }
        .header-title {
            color: #fff;
            font-size: 20px;
            font-weight: bold;
        }
        .user-info {
            position: absolute;
            left: 15px;
            color: #aaa;
            font-size: 14px;
        }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
            gap: 25px;
        }
        .menu-btn {
            width: 100%;
            max-width: 280px;
            padding: 25px 30px;
            background: linear-gradient(135deg, #3a3a6e, #2a2a5e);
            border: 2px solid #5a5a8e;
            border-radius: 16px;
            color: #fff;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s, border-color 0.2s;
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .menu-btn:hover {
            border-color: #8a8aae;
            transform: scale(1.02);
        }
        .menu-btn:active {
            transform: scale(0.98);
        }
        .menu-btn .icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        .menu-btn.battle {
            background: linear-gradient(135deg, #ff6666, #ff4444);
            border-color: #ff8888;
        }
        .menu-btn.battle:hover {
            border-color: #ffaaaa;
        }
        .menu-btn.battle {
            background: linear-gradient(135deg, #ff6666, #ff4444);
            border-color: #ff8888;
            align-items: stretch;
        }
        .menu-btn.battle > .icon {
            align-self: center;
        }
        .menu-btn.battle .btn-text {
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 2px;
        }
        .menu-btn.battle .btn-sub {
            font-size: 12px;
            font-weight: normal;
            color: rgba(255,255,255,0.85);
        }
        .menu-btn.battle .btn-sub2 {
            font-size: 11px;
            font-weight: normal;
            color: rgba(255,255,255,0.65);
        }
        .menu-btn.characters {
            background: linear-gradient(135deg, #4488ff, #2266dd);
            border-color: #66aaff;
        }
        .menu-btn.characters:hover {
            border-color: #88ccff;
        }
        .menu-btn.team {
            background: linear-gradient(135deg, #44dd88, #22bb66);
            border-color: #66ffaa;
        }
        .menu-btn.team:hover {
            border-color: #88ffcc;
        }
        .logout-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 8px 16px;
            background: #ff4444;
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
        }
        .logout-btn:hover {
            background: #ff6666;
        }
    </style>
</head>
<body>
    <div class="main-container">
        <div class="header">
            <span class="user-info" id="nickname"></span>
            <span class="header-title">卡牌消除</span>
            <button class="logout-btn" onclick="logout()">退出</button>
        </div>
        <div class="content">
            <button class="menu-btn characters" onclick="showCharacters()">
                <span class="icon">👥</span>
                <span>角色列表</span>
            </button>
            <button class="menu-btn team" onclick="showTeam()">
                <span class="icon">⚔️</span>
                <span>队伍设置</span>
            </button>
            <button class="menu-btn battle" id="battleBtn" onclick="startBattle()">
                <span class="icon">🎮</span>
                <span class="btn-text">
                    <span id="battleBtnText">进入战斗</span>
                    <span class="btn-sub" id="battleBtnSub" style="display:none"></span>
                    <span class="btn-sub2" id="battleBtnSub2" style="display:none"></span>
                </span>
            </button>
        </div>
    </div>

    <script src="common/auth.js"></script>
    <script>
        let activeBattleSession = null;

        async function init() {
            const authData = await checkAuth();
            if (authData) {
                document.getElementById('nickname').textContent = authData.nickname;
            }

            try {
                const res = await apiFetch('/battle-sessions/active');
                if (res && res.ok) {
                    const bs = await res.json();
                    if (bs && bs.status === 'active') {
                        activeBattleSession = bs;
                        const btn = document.getElementById('battleBtn');
                        const btnText = document.getElementById('battleBtnText');
                        const btnSub = document.getElementById('battleBtnSub');
                        const btnSub2 = document.getElementById('battleBtnSub2');
                        btnText.textContent = '继续战斗';
                        btn.style.background = 'linear-gradient(135deg, #ffaa44, #ff8800)';
                        btn.style.borderColor = '#ffcc66';

                        const progress = (bs.current_enemy_index + 1);
                        const total = bs.total_enemies || '?';
                        btnSub.textContent = `${bs.chapter_name} · ${bs.level_name} · 进度 ${progress}/${total}`;
                        btnSub.style.display = '';
                        btnSub2.textContent = `${bs.team_name} · HP: ${bs.player_hp}`;
                        btnSub2.style.display = '';
                    }
                }
            } catch (e) {
                console.error('Failed to check active battle:', e);
            }
        }

        function showCharacters() {
            window.location.href = 'characters.html';
        }

        function showTeam() {
            window.location.href = 'team.html';
        }

        function startBattle() {
            if (activeBattleSession) {
                window.location.href = `index.html?level_id=${activeBattleSession.level_id}&team_id=${activeBattleSession.team_id}`;
            } else {
                window.location.href = 'level-select.html';
            }
        }

        init();
    </script>
</body>
</html>
