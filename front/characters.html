<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>角色列表</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
        }
        .container {
            width: 100%;
            height: 100%;
            max-width: 375px;
            margin: 0 auto;
            background: #2a2a4e;
            display: flex;
            flex-direction: column;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: #1a1a2e;
            color: #fff;
        }
        .back-btn {
            background: none;
            border: 1px solid #666;
            color: #fff;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
        }
        .header-title {
            font-size: 18px;
            font-weight: bold;
        }
        .char-list {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        .char-card {
            background: #3a3a5e;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            border-left: 4px solid;
        }
        .char-card.warrior { border-color: #ff4444; }
        .char-card.archer { border-color: #4488ff; }
        .char-card.mage { border-color: #ffff44; }
        .char-name {
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            margin-bottom: 5px;
        }
        .char-type {
            font-size: 14px;
            color: #aaa;
        }

        .empty-msg {
            text-align: center;
            color: #888;
            padding: 50px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="back-btn" onclick="goBack()">返回</button>
            <span class="header-title">角色列表</span>
            <span style="width: 60px;"></span>
        </div>
        <div class="char-list" id="charList">
            <div class="empty-msg">加载中...</div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        function goBack() {
            window.location.href = 'main.html';
        }

        async function loadCharacters() {
            const token = localStorage.getItem('token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/characters`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const chars = await res.json();
                    renderCharacters(chars);
                } else {
                    document.getElementById('charList').innerHTML = '<div class="empty-msg">加载失败</div>';
                }
            } catch (e) {
                document.getElementById('charList').innerHTML = '<div class="empty-msg">加载失败</div>';
            }
        }

        function renderCharacters(chars) {
            const list = document.getElementById('charList');
            if (chars.length === 0) {
                list.innerHTML = '<div class="empty-msg">暂无角色</div>';
                return;
            }

            const typeNames = { 1: '战士', 2: '弓箭手', 3: '法师' };
            const typeClass = { 1: 'warrior', 2: 'archer', 3: 'mage' };

            list.innerHTML = chars.map(c => `
                <div class="char-card ${typeClass[c.character_type_id]}">
                    <div class="char-name">${c.character_name}</div>
                    <div class="char-type">${typeNames[c.character_type_id]}</div>
                </div>
            `).join('');
        }

        loadCharacters();
    </script>
</body>
</html>
